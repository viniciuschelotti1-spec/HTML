<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes Externas</title>
    <style>
        @font-face {
            font-family: "Kinkee";
            src: url(kinkee/KINKEE__.TTF);
            /* 
            Tipos de Format()
            - opentype (OTF)
            - truetype(TTF)
            - embedded-opentype
            - truetype-aat (Apple Advanced Typography)
            */
        }
        body {
            font-family: Arial, Helvetica, sans-serif;
        }
        h1 {
            font-family: 'Kinkee', Times, serif;
            font-size: 4em;
            margin-bottom: 0;
            margin-top: 0.2em
        }
    </style>
</head>
<body>
    <h1>Olá, Mundo</h1>
    <p>Lorem ipsum dolor, sit amet consectetur adipisicing elit. Nisi, asperiores dolor atque beatae perferendis quae tempore dignissimos excepturi non totam quisquam corrupti neque, debitis animi esse est voluptate optio illo?</p>
</body>
</html>
